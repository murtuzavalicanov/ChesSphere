jwt:
  secret: "Z3VndXN0YXZvMTIzNDU2Nzg5MGFiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eHl6MTIzNDU2Nzg5MA=="

spring:
  cloud:
    gateway:
      routes:
        # User Service (Login/Register üçün filtr lazım deyil)
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/user/**
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
  application:
    name: gateway


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8765

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  swagger-ui:
    # Bu hissə Swagger menyusunda aşağı açılan siyahını yaradır
    urls:
      - name: "User Service"
        url: /user/v3/api-docs
  # Gateway-in öz endpointlərini göstərmək istəmirsinizsə:
  api-docs:
    enabled: true


